name: Release Dev

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  NODE_VERSION: "24"
  TERRAFORM_VERSION: "1.14.8"
  TERRAFORM_WORKING_DIRECTORY: infra/terraform
  TERRAFORM_ENV_FILE: environments/dev.tfvars
  TFSTATE_RESOURCE_GROUP: rg-tfstate-mountain-blog-shared
  TFSTATE_STORAGE_ACCOUNT: tfstatemtnblog60f9b6
  TFSTATE_CONTAINER: tfstate
  TFSTATE_KEY_DEV: mountain-blog/dev.tfstate

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Smoke Test Static Export
        run: npm run test:smoke

  apply_infra:
    runs-on: ubuntu-latest
    needs: verify
    outputs:
      static_web_app_name: ${{ steps.terraform_outputs.outputs.static_web_app_name }}
      static_web_app_url: ${{ steps.terraform_outputs.outputs.static_web_app_url }}
    defaults:
      run:
        working-directory: ${{ env.TERRAFORM_WORKING_DIRECTORY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Init
        run: >
          terraform init
          -backend-config="resource_group_name=${{ env.TFSTATE_RESOURCE_GROUP }}"
          -backend-config="storage_account_name=${{ env.TFSTATE_STORAGE_ACCOUNT }}"
          -backend-config="container_name=${{ env.TFSTATE_CONTAINER }}"
          -backend-config="key=${{ env.TFSTATE_KEY_DEV }}"

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -out=tfplan -var-file=${{ env.TERRAFORM_ENV_FILE }}

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

      - name: Capture Terraform Outputs
        id: terraform_outputs
        shell: bash
        run: |
          echo "static_web_app_name=$(terraform output -raw static_web_app_name)" >> "$GITHUB_OUTPUT"
          echo "static_web_app_url=$(terraform output -raw static_web_app_url)" >> "$GITHUB_OUTPUT"

  deploy_app:
    runs-on: ubuntu-latest
    needs: apply_infra
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Fetch Static Web App Deployment Token
        id: deployment_token
        shell: bash
        run: |
          token="$(az staticwebapp secrets list --name "${{ needs.apply_infra.outputs.static_web_app_name }}" --query 'properties.apiKey' -o tsv)"
          echo "::add-mask::$token"
          echo "token=$token" >> "$GITHUB_OUTPUT"

      - name: Build And Deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ steps.deployment_token.outputs.token }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "/"
          api_location: ""
          output_location: "out"
        env:
          IS_STATIC_EXPORT: true
          NEXT_PUBLIC_SITE_URL: ${{ needs.apply_infra.outputs.static_web_app_url }}
