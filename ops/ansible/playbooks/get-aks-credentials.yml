---
- name: Get AKS credentials
  hosts: ops
  become: false
  vars:
    aks_resource_group: "rg-mountain-blog-dev"
    aks_cluster_name: "aks-mountain-blog-dev"
  tasks:
    - name: Pull kubeconfig from AKS
      ansible.builtin.shell: |
        set -euo pipefail
        az aks get-credentials --resource-group "{{ aks_resource_group }}" --name "{{ aks_cluster_name }}" --overwrite-existing
      args:
        executable: /bin/bash

