apiVersion: apps/v1
kind: Deployment
metadata:
  name: mountain-blog
  namespace: app
  labels:
    app.kubernetes.io/name: mountain-blog
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: mountain-blog
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mountain-blog
    spec:
      containers:
        - name: mountain-blog
          image: ghcr.io/example/mountain-blog-project-blueprint:main
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3000"
            - name: NEXT_PUBLIC_SITE_URL
              value: https://mountain-blog.local
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi

